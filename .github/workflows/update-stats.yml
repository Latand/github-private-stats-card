name: Update private GitHub stats card

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GH_STATS_TOKEN exists
        run: |
          if [ -z "${{ secrets.GH_STATS_TOKEN }}" ]; then
            echo "::error::Missing GH_STATS_TOKEN secret (classic PAT with repo + read:user)."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_USERNAME: Latand
        run: |
          python scripts/generate_stats.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- generated; then
            echo "No stats changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          git commit -m "chore(stats): daily refresh"
          git push
